<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <h1>Pomodoro</h1>
      <div class="timer" id="timer">25:00</div>
      <div class="controls">
        <button class="btn" onclick="startTimer()">시작</button>
        <button class="btn" onclick="stopTimer()">정지</button>
        <button class="btn" onclick="resetTimer()">초기화</button>
      </div>
      <div class="settings">
        <button class="btn btn--settings" onclick="location.href='settings.html'">설정</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
