<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro - Setting</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <h3>Setting</h3>
    <div class="field">
      <label for="timer-duration">타이머 시간 (분)</label>
      <input type="number" id="timer-duration" min="1" max="60" value="25">
    </div>
    <button class="btn-save">설정 완료</button>
  </div>
  <script src="settings.js"></script>
</body>
</html>
